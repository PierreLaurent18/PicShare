<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicShare - Mon Espace</title>
    <link rel="stylesheet" href="../assets/css/style.css?v=2">
</head>
<body>

    <header class="entete-principale">
        <div class="container navigation-flex">
            <a href="../../index.html" class="logo">📸 PicShare</a>
            <nav class="navigation-principale" aria-label="Navigation membre">
                <ul>
                    <li><span id="souhait-utilisateur" style="font-weight: 600;">Bonjour !</span></li>
                    <li><button id="bouton-deconnexion" class="bouton-secondaire">Déconnexion</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 2rem; padding-bottom: 3rem;">

        <section style="margin-bottom:2rem;background:var(--fond-carte);border:1px solid var(--bordure);border-radius:var(--arrondi-md);padding:1.25rem;">
            <form id="form-recherche">
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.75rem;align-items:end;">
                    <div class="groupe-champ" style="margin:0;">
                        <label for="critere-q">Mot-clé</label>
                        <input type="text" id="critere-q" placeholder="Légende de la photo">
                    </div>
                    <div class="groupe-champ" style="margin:0;">
                        <label for="critere-tag">Étiquette</label>
                        <input type="text" id="critere-tag" placeholder="Ex: plage">
                    </div>
                    <div class="groupe-champ" style="margin:0;">
                        <label for="critere-album">Album</label>
                        <input type="text" id="critere-album" placeholder="Nom de l'album">
                    </div>
                    <div class="groupe-champ" style="margin:0;">
                        <label for="critere-date">Date de prise</label>
                        <input type="date" id="critere-date">
                    </div>
                    <div style="display:flex;gap:0.5rem;">
                        <button type="submit" class="bouton-principal" style="flex:1;">🔍 Chercher</button>
                        <button type="button" id="btn-effacer-recherche" class="bouton-secondaire">Effacer</button>
                    </div>
                </div>
            </form>
        </section>

        <section id="section-resultats" style="display:none;margin-bottom:2rem;">
            <h3 id="titre-resultats" style="margin-bottom:1rem;color:#1e293b;"></h3>
            <div id="resultats-photos"></div>
            <p id="message-aucun-resultat" style="display:none;color:var(--texte-attenue);text-align:center;padding:2rem 0;">
                Aucune photo trouvée.
            </p>
        </section>

        <div id="zone-albums">
            <div class="barre-onglets">
                <nav class="onglets" id="onglets-albums">
                    <button class="onglet actif" data-cible="section-albums">Mes albums</button>
                    <button class="onglet" data-cible="section-partages">Partagés avec moi</button>
                    <button class="onglet" data-cible="section-publics">Publics</button>
                </nav>
                <button id="bouton-ouvrir-modal" class="bouton-principal">+ Créer un album</button>
            </div>

            <section id="section-albums" class="panneau-onglet">
                <div id="grille-albums" class="grille-albums">
                    <p id="message-vide" style="grid-column: 1/-1; text-align: center; color: var(--texte-attenue); padding: 3rem 0;">
                        Vous n'avez pas encore créé d'album. Cliquez sur « Créer un album » pour commencer !
                    </p>
                </div>
            </section>

            <section id="section-partages" class="panneau-onglet" style="display:none;">
                <div id="grille-partages" class="grille-albums">
                    <p id="message-partages-vide" style="grid-column:1/-1;text-align:center;color:var(--texte-attenue);padding:2rem 0;">
                        Aucun album partagé avec vous pour le moment.
                    </p>
                </div>
            </section>

            <section id="section-publics" class="panneau-onglet" style="display:none;">
                <div id="grille-publics" class="grille-albums">
                    <p id="message-publics-vide" style="grid-column:1/-1;text-align:center;color:var(--texte-attenue);padding:2rem 0;">
                        Aucun album public disponible.
                    </p>
                </div>
            </section>
        </div>

    </main>

    <div id="modal-album" class="boite-modale" style="display: none;">
        <div class="contenu-modale">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 id="titre-modal-album">Nouveau dossier d'album</h3>
                <button id="bouton-fermer-modal" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <form id="formulaire-album">
                <div class="groupe-champ">
                    <label for="titre-album">Titre de l'album</label>
                    <input type="text" id="titre-album" name="title" placeholder="Ex: Vacances d'été 2026" required>
                </div>
                <div class="groupe-champ">
                    <label for="visibilite-album">Visibilité</label>
                    <select id="visibilite-album" name="visibility" style="padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: var(--arrondi-sm);">
                        <option value="private">Privé (Moi uniquement)</option>
                        <option value="public">Public (Visible par tout le monde)</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                    <button type="button" id="bouton-annuler-modal" class="bouton-secondaire">Annuler</button>
                    <button type="submit" id="bouton-soumettre-album" class="bouton-principal">Créer l'album</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/AlbumService.js?v=8"></script>
    <script src="../assets/js/SearchService.js?v=8"></script>
    <script src="../assets/js/ShareService.js?v=8"></script>
    <script src="../assets/js/AlbumController.js?v=8"></script>
</body>
</html>
